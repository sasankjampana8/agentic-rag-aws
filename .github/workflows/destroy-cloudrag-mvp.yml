name: Destroy CloudRAG MVP

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: CloudFormation stack name
        required: true
        default: cloudrag-mvp
      region:
        description: AWS region
        required: true
        default: ap-south-1
      empty_raw_bucket:
        description: Empty the stack-created raw document bucket before deletion
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    env:
      STACK_NAME: ${{ inputs.stack_name }}
      AWS_REGION: ${{ inputs.region }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Empty raw bucket
        if: ${{ inputs.empty_raw_bucket }}
        run: |
          BUCKET="$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='RawBucket'].OutputValue" \
            --output text 2>/dev/null || true)"
          if [ -n "${BUCKET}" ] && [ "${BUCKET}" != "None" ]; then
            echo "Emptying s3://${BUCKET}"
            aws s3 rm "s3://${BUCKET}" --recursive || true
          fi

      - name: Delete stack
        run: |
          aws cloudformation delete-stack --stack-name "${STACK_NAME}" --region "${AWS_REGION}"
          aws cloudformation wait stack-delete-complete --stack-name "${STACK_NAME}" --region "${AWS_REGION}"
